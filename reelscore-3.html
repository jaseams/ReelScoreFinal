<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReelScore – Fishing Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f4f2ec;min-height:100vh;padding-bottom:4rem;}
.app{max-width:520px;margin:0 auto;}
.header{background:#0a2a1a;color:#d4edaa;padding:1.1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-family:'Playfair Display',serif;font-size:21px;color:#d4edaa;display:flex;align-items:center;gap:8px;}
.header-user{display:flex;align-items:center;gap:8px;}
.avatar-sm{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.tabs{display:flex;background:#0a2a1a;padding:0 1.25rem;border-bottom:2px solid #1a4a2a;}
.tab{padding:.6rem 1rem;font-size:13px;font-weight:500;color:#6a9a7a;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:#d4edaa;border-bottom-color:#7ec84a;}
.tab:hover:not(.active){color:#aadcbb;}
.section{display:none;padding:1.1rem 1.1rem 0;}
.section.active{display:block;}
.card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:.9rem 1.1rem;margin-bottom:.85rem;}
.card-title{font-size:12px;font-weight:500;color:#666;margin-bottom:.7rem;text-transform:uppercase;letter-spacing:.05em;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:.65rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;font-weight:500;color:#666;}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;color:#111;width:100%;}
input:focus,select:focus{outline:none;border-color:#7ec84a;box-shadow:0 0 0 2px rgba(126,200,74,.15);}
.btn{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#111;}
.btn:hover{background:#f4f2ec;}
.btn:active{transform:scale(.98);}
.btn-primary{background:#0a2a1a;color:#d4edaa;border-color:#0a2a1a;width:100%;padding:11px;font-size:14px;margin-top:.5rem;}
.btn-primary:hover{background:#1a4a2a;border-color:#1a4a2a;}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:#f09595;}
.btn-sm{padding:5px 12px;font-size:12px;}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.85rem;}
.metric-card{background:#f4f2ec;border-radius:8px;padding:.75rem .9rem;text-align:center;}
.metric-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;}
.metric-value{font-family:'Playfair Display',serif;font-size:22px;color:#111;margin-top:2px;}
.leaderboard-row{display:flex;align-items:center;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);gap:10px;}
.leaderboard-row:last-child{border-bottom:none;}
.rank{font-family:'Playfair Display',serif;font-size:19px;width:30px;text-align:center;}
.rank.gold{color:#c8960a;} .rank.silver{color:#888;} .rank.bronze{color:#993c1d;} .rank.other{color:#888;font-size:14px;}
.angler-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;flex-shrink:0;}
.angler-info{flex:1;min-width:0;}
.angler-name{font-size:14px;font-weight:500;color:#111;}
.angler-sub{font-size:11px;color:#888;margin-top:1px;}
.stat-chip{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;background:#f4f2ec;color:#666;white-space:nowrap;}
.stat-chip.green{background:#eaf3de;color:#3b6d11;}
.catch-card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);margin-bottom:.7rem;overflow:hidden;}
.catch-img{width:100%;height:120px;object-fit:cover;display:block;}
.catch-img-ph{width:100%;height:72px;background:#f4f2ec;display:flex;align-items:center;justify-content:center;font-size:22px;color:#aaa;}
.catch-body{padding:.8rem 1rem;}
.catch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.catch-fish{font-size:14px;font-weight:500;}
.catch-weight{font-family:'Playfair Display',serif;font-size:16px;color:#3b6d11;}
.catch-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.catch-tag{font-size:11px;padding:2px 7px;border-radius:99px;background:#f4f2ec;color:#666;}
.sort-row{display:flex;gap:6px;margin-bottom:.85rem;overflow-x:auto;padding-bottom:2px;}
.sort-btn{padding:5px 11px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#666;}
.sort-btn.active{background:#0a2a1a;color:#d4edaa;border-color:#0a2a1a;}
.photo-upload{border:1.5px dashed rgba(0,0,0,0.2);border-radius:8px;padding:1.25rem;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.photo-upload:hover{border-color:#7ec84a;}
.photo-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.photo-preview{width:100%;max-height:130px;object-fit:cover;border-radius:8px;margin-top:6px;}
.empty-state{text-align:center;padding:2.5rem 1rem;color:#888;font-size:14px;}
.empty-icon{font-size:32px;margin-bottom:.5rem;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:#0a2a1a;color:#d4edaa;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:500;transition:transform .3s ease;z-index:100;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.group-code{font-family:monospace;font-size:22px;font-weight:500;letter-spacing:.25em;text-align:center;padding:1rem;background:#f4f2ec;border-radius:8px;color:#111;margin:.5rem 0;}
.divider{display:flex;align-items:center;gap:.75rem;margin:.75rem 0;color:#888;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:.5px;background:rgba(0,0,0,0.1);}
.tab-bar-2{display:flex;gap:6px;margin-bottom:.85rem;}
.tab2{padding:6px 14px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#666;}
.tab2.active{background:#0a2a1a;color:#d4edaa;border-color:#0a2a1a;}
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.member-row:last-child{border-bottom:none;}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;}
.badge-admin{background:#eaf3de;color:#3b6d11;}
.badge-member{background:#f4f2ec;color:#666;}
.err{font-size:12px;color:#a32d2d;margin-top:4px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-title"><span style="font-size:20px;">🎣</span> ReelScore</div>
    <div class="header-user" id="header-user"></div>
  </div>
  <div id="main-area"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const COLORS=[{bg:'#eaf3de',text:'#3b6d11'},{bg:'#e6f1fb',text:'#0c447c'},{bg:'#faeeda',text:'#633806'},{bg:'#fbeaf0',text:'#72243e'},{bg:'#e1f5ee',text:'#085041'},{bg:'#faece7',text:'#712b13'}];

let state={currentUser:null,currentGroupId:null,activeTab:'leaderboard',sortMode:'count',feedSort:'recent',photoDataUrl:null};
let db={users:{},groups:{},catches:[]};

function loadDB(){
  try{const r=localStorage.getItem('rs-db');if(r)db=JSON.parse(r);}catch(e){}
  try{const s=localStorage.getItem('rs-session');if(s){const sess=JSON.parse(s);if(db.users[sess.userId])state.currentUser=db.users[sess.userId];if(sess.groupId&&db.groups[sess.groupId])state.currentGroupId=sess.groupId;}}catch(e){}
  render();
}

function saveDB(){try{localStorage.setItem('rs-db',JSON.stringify(db));}catch(e){}}
function saveSession(){try{localStorage.setItem('rs-session',JSON.stringify({userId:state.currentUser?state.currentUser.id:null,groupId:state.currentGroupId}));}catch(e){}}

function uid(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function groupCode(){let c='';const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(let i=0;i<6;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c;}
function initials(name){return(name||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}
function userColor(userId){const ids=Object.keys(db.users).sort();return COLORS[ids.indexOf(userId)%COLORS.length];}
function v(id){const el=document.getElementById(id);return el?el.value:'';}

function render(){
  if(!state.currentUser){renderAuth();return;}
  if(!state.currentGroupId){renderGroupSelect();return;}
  renderApp();
}

function renderAuth(){
  document.getElementById('header-user').innerHTML='';
  document.getElementById('main-area').innerHTML='<div style="padding:1.5rem 1.1rem 0;"><div id="auth-panel"></div></div>';
  showAuthTab('login');
}

function showAuthTab(tab){
  const p=document.getElementById('auth-panel');
  if(tab==='login'){
    p.innerHTML=`<div class="card" style="max-width:420px;margin:0 auto;">
      <div style="text-align:center;margin-bottom:1rem;">
        <div style="font-family:'Playfair Display',serif;font-size:20px;color:#111;">Welcome back</div>
        <div style="font-size:13px;color:#888;margin-top:4px;">Sign in to your ReelScore account</div>
      </div>
      <div class="form-group"><label>Username</label><input id="li-user" placeholder="Your username"/></div>
      <div class="form-group"><label>Password</label><input id="li-pass" type="password" placeholder="Password"/></div>
      <div class="err" id="li-err"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
      <div class="divider">or</div>
      <button class="btn" style="width:100%;" onclick="showAuthTab('register')">Create an account</button>
    </div>`;
  } else {
    p.innerHTML=`<div class="card" style="max-width:420px;margin:0 auto;">
      <div style="text-align:center;margin-bottom:1rem;">
        <div style="font-family:'Playfair Display',serif;font-size:20px;color:#111;">Create account</div>
        <div style="font-size:13px;color:#888;margin-top:4px;">Join ReelScore and start tracking</div>
      </div>
      <div class="form-group"><label>Display name</label><input id="reg-name" placeholder="e.g. Jake Miller"/></div>
      <div class="form-group"><label>Username</label><input id="reg-user" placeholder="Lowercase, no spaces"/></div>
      <div class="form-group"><label>Password</label><input id="reg-pass" type="password" placeholder="Choose a password"/></div>
      <div class="err" id="reg-err"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create account</button>
      <div class="divider">or</div>
      <button class="btn" style="width:100%;" onclick="showAuthTab('login')">Sign in instead</button>
    </div>`;
  }
}

function doLogin(){
  const u=v('li-user').toLowerCase().trim(),p=v('li-pass');
  const user=Object.values(db.users).find(x=>x.username===u&&x.password===p);
  if(!user){document.getElementById('li-err').textContent='Incorrect username or password.';return;}
  state.currentUser=user;saveSession();render();
}

function doRegister(){
  const name=v('reg-name').trim(),username=v('reg-user').toLowerCase().trim(),pass=v('reg-pass');
  if(!name||!username||!pass){document.getElementById('reg-err').textContent='All fields required.';return;}
  if(!/^[a-z0-9_]+$/.test(username)){document.getElementById('reg-err').textContent='Username: letters, numbers, underscores only.';return;}
  if(Object.values(db.users).find(x=>x.username===username)){document.getElementById('reg-err').textContent='Username already taken.';return;}
  const id=uid();
  db.users[id]={id,name,username,password:pass};
  saveDB();state.currentUser=db.users[id];saveSession();render();
}

function renderGroupSelect(){
  const u=state.currentUser,col=userColor(u.id);
  document.getElementById('header-user').innerHTML=`
    <div class="avatar-sm" style="background:${col.bg};color:${col.text};">${initials(u.name)}</div>
    <span style="font-size:12px;color:#6a9a7a;">${u.name}</span>
    <button class="btn btn-sm" onclick="doLogout()" style="font-size:11px;padding:3px 8px;color:#6a9a7a;border-color:#1a4a2a;">Sign out</button>`;
  const myGroups=Object.values(db.groups).filter(g=>g.members.includes(u.id));
  document.getElementById('main-area').innerHTML=`
  <div style="padding:1.25rem 1.1rem 0;">
    <div id="group-panel-tabs" class="tab-bar-2">
      <button class="tab2 active" onclick="showGroupPanelTab('join')">Join or create</button>
      ${myGroups.length?`<button class="tab2" onclick="showGroupPanelTab('my')">My groups (${myGroups.length})</button>`:''}
    </div>
    <div id="group-panel"></div>
  </div>`;
  showGroupPanelTab('join');
}

function showGroupPanelTab(tab){
  document.querySelectorAll('#group-panel-tabs .tab2').forEach(t=>t.classList.remove('active'));
  const tabs=[...document.querySelectorAll('#group-panel-tabs .tab2')];
  if(tab==='join')tabs[0]&&tabs[0].classList.add('active');
  else tabs[1]&&tabs[1].classList.add('active');
  const u=state.currentUser;
  const myGroups=Object.values(db.groups).filter(g=>g.members.includes(u.id));
  const p=document.getElementById('group-panel');
  if(tab==='my'){
    p.innerHTML=myGroups.map(g=>`
      <div class="card" style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:500;">${g.name}</div>
          <div style="font-size:12px;color:#888;margin-top:2px;">${g.members.length} member${g.members.length!==1?'s':''} · Code: <strong>${g.code}</strong></div>
        </div>
        <button class="btn btn-sm" onclick="enterGroup('${g.id}')">Enter</button>
      </div>`).join('');
  } else {
    p.innerHTML=`
    <div class="card">
      <div class="card-title">Create a new group</div>
      <div class="form-group"><label>Group name</label><input id="grp-name" placeholder="e.g. Lake Weekend Crew"/></div>
      <div class="err" id="grp-err"></div>
      <button class="btn btn-primary" onclick="doCreateGroup()">Create group</button>
    </div>
    <div class="divider">or join an existing group</div>
    <div class="card">
      <div class="card-title">Join with a code</div>
      <div class="form-group"><label>Group code</label><input id="join-code" placeholder="6-character code" maxlength="8" style="text-transform:uppercase;letter-spacing:.1em;"/></div>
      <div class="err" id="join-err"></div>
      <button class="btn btn-primary" onclick="doJoinGroup()">Join group</button>
    </div>`;
  }
}

function doCreateGroup(){
  const name=v('grp-name').trim();
  if(!name){document.getElementById('grp-err').textContent='Enter a group name.';return;}
  const id=uid(),code=groupCode();
  db.groups[id]={id,name,code,adminId:state.currentUser.id,members:[state.currentUser.id],createdAt:Date.now()};
  saveDB();enterGroup(id);showToast('Group created! Share code: '+code);
}

function doJoinGroup(){
  const code=v('join-code').toUpperCase().trim();
  const group=Object.values(db.groups).find(g=>g.code===code);
  if(!group){document.getElementById('join-err').textContent='Group not found. Check the code.';return;}
  if(!group.members.includes(state.currentUser.id))group.members.push(state.currentUser.id);
  saveDB();enterGroup(group.id);showToast('Joined '+group.name+'!');
}

function enterGroup(id){state.currentGroupId=id;state.activeTab='leaderboard';saveSession();render();}
function doLogout(){state.currentUser=null;state.currentGroupId=null;saveSession();render();}

function leaveGroup(){
  const g=db.groups[state.currentGroupId];
  if(!g)return;
  g.members=g.members.filter(m=>m!==state.currentUser.id);
  if(!g.members.length)delete db.groups[state.currentGroupId];
  saveDB();state.currentGroupId=null;saveSession();render();showToast('Left group');
}

function renderApp(){
  const u=state.currentUser,g=db.groups[state.currentGroupId],col=userColor(u.id);
  document.getElementById('header-user').innerHTML=`
    <div class="avatar-sm" style="background:${col.bg};color:${col.text};">${initials(u.name)}</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;">
      <span style="font-size:12px;color:#d4edaa;font-weight:500;">${u.name}</span>
      <span style="font-size:10px;color:#6a9a7a;">${g?g.name:''}</span>
    </div>`;
  const tabList=['leaderboard','log','feed','group'];
  document.getElementById('main-area').innerHTML=`
    <div class="tabs">${tabList.map(t=>`<button class="tab${state.activeTab===t?' active':''}" onclick="switchTab('${t}')">${t==='log'?'Log catch':t==='group'?'Group':t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}</div>
    <div id="tab-content" style="padding:1.1rem 1.1rem 0;"></div>`;
  renderTabContent();
}

function renderTabContent(){
  const el=document.getElementById('tab-content');if(!el)return;
  if(state.activeTab==='leaderboard')el.innerHTML=buildLeaderboard();
  else if(state.activeTab==='log')el.innerHTML=buildLogForm();
  else if(state.activeTab==='feed')el.innerHTML=buildFeed();
  else if(state.activeTab==='group')el.innerHTML=buildGroupPanel();
}

function groupCatches(){return db.catches.filter(c=>c.groupId===state.currentGroupId);}

function getAnglers(catches){
  const map={};
  catches.forEach(c=>{
    if(!map[c.userId])map[c.userId]={userId:c.userId,name:c.anglerName,count:0,totalWeight:0,biggestFish:0};
    map[c.userId].count++;
    const w=parseFloat(c.weight)||0;
    map[c.userId].totalWeight+=w;
    if(w>map[c.userId].biggestFish)map[c.userId].biggestFish=w;
  });
  return Object.values(map);
}

function buildLeaderboard(){
  const catches=groupCatches();
  let anglers=getAnglers(catches);
  if(state.sortMode==='count')anglers.sort((a,b)=>b.count-a.count||b.totalWeight-a.totalWeight);
  else if(state.sortMode==='weight')anglers.sort((a,b)=>b.totalWeight-a.totalWeight);
  else anglers.sort((a,b)=>b.biggestFish-a.biggestFish);
  const tw=catches.reduce((s,c)=>s+(parseFloat(c.weight)||0),0);
  const medals=['gold','silver','bronze'];
  const rows=anglers.length?anglers.map((a,i)=>{
    const col=userColor(a.userId),init=initials(a.name);
    const rk=i<3?['🥇','🥈','🥉'][i]:`#${i+1}`;
    const rkClass=i<3?medals[i]:'other';
    const main=state.sortMode==='count'?`${a.count} catch${a.count!==1?'es':''}`:state.sortMode==='weight'?`${a.totalWeight.toFixed(1)} lbs total`:`${a.biggestFish.toFixed(1)} lb best`;
    const sub=state.sortMode==='count'?`${a.totalWeight.toFixed(1)} lb total`:`${a.count} catch${a.count!==1?'es':''}`;
    const bf=a.biggestFish>0&&state.sortMode!=='biggest'?`<span class="stat-chip green">🐟 ${a.biggestFish.toFixed(1)} lb</span>`:'';
    return `<div class="leaderboard-row">
      <div class="rank ${rkClass}">${rk}</div>
      <div class="angler-avatar" style="background:${col.bg};color:${col.text};">${init}</div>
      <div class="angler-info"><div class="angler-name">${a.name}</div><div class="angler-sub">${sub}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;"><span class="stat-chip">${main}</span>${bf}</div>
    </div>`;
  }).join(''):`<div class="empty-state"><div class="empty-icon">🏆</div>No catches yet. Log one!</div>`;
  return `
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Catches</div><div class="metric-value">${catches.length}</div></div>
    <div class="metric-card"><div class="metric-label">Total lbs</div><div class="metric-value">${tw.toFixed(1)}</div></div>
    <div class="metric-card"><div class="metric-label">Anglers</div><div class="metric-value">${anglers.length}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Rankings</div>
    <div class="sort-row">
      <button class="sort-btn${state.sortMode==='count'?' active':''}" onclick="setSort('count')">Most catches</button>
      <button class="sort-btn${state.sortMode==='weight'?' active':''}" onclick="setSort('weight')">Heaviest total</button>
      <button class="sort-btn${state.sortMode==='biggest'?' active':''}" onclick="setSort('biggest')">Biggest fish</button>
    </div>
    ${rows}
  </div>`;
}

function buildLogForm(){
  return `
  <div class="card">
    <div class="card-title">The catch</div>
    <div class="form-grid">
      <div class="form-group"><label>Fish species</label>
        <select id="fish-type"><option value="">Select species</option>
          ${['Largemouth Bass','Smallmouth Bass','Striped Bass','Bluegill','Crappie','Catfish','Walleye','Northern Pike','Muskie','Trout','Salmon','Carp','Perch','Other'].map(x=>`<option>${x}</option>`).join('')}
        </select></div>
      <div class="form-group"><label>Weight (lbs)</label><input type="number" id="fish-weight" placeholder="e.g. 4.2" step="0.1" min="0"/></div>
      <div class="form-group"><label>Lure / bait</label>
        <select id="lure-type" onchange="handleCombo('lure-type','lure-custom')">
          <option value="">Select or type below</option>
          ${['Crankbait','Spinnerbait','Jig','Plastic worm','Topwater popper','Live bait','Fly','Swimbait','Spoon','Drop shot'].map(x=>`<option>${x}</option>`).join('')}
        </select>
        <input type="text" id="lure-custom" placeholder="Or type specific lure name..." style="margin-top:5px;"/></div>
      <div class="form-group"><label>Reel</label>
        <select id="reel-type" onchange="handleCombo('reel-type','reel-custom')">
          <option value="">Select or type below</option>
          ${['Baitcasting','Spinning','Spincast','Fly reel','Trolling'].map(x=>`<option>${x}</option>`).join('')}
        </select>
        <input type="text" id="reel-custom" placeholder="Or type specific reel name..." style="margin-top:5px;"/></div>
      <div class="form-group"><label>Time of day</label>
        <select id="time-of-day"><option value="">Select time</option>
          ${['Early morning (4–7am)','Morning (7–10am)','Midday (10am–2pm)','Afternoon (2–5pm)','Evening (5–8pm)','Night (8pm+)'].map(x=>`<option>${x}</option>`).join('')}
        </select></div>
      <div class="form-group"><label>Weather</label>
        <select id="weather"><option value="">Select weather</option>
          ${['Sunny / clear','Partly cloudy','Overcast','Light rain','Windy','Foggy','Post-rain'].map(x=>`<option>${x}</option>`).join('')}
        </select></div>
      <div class="form-group full"><label>Location</label><input type="text" id="location" placeholder="Lake, river, spot name..."/></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Photo</div>
    <div class="photo-upload">
      <input type="file" accept="image/*" id="photo-input" onchange="handlePhoto(event)"/>
      <div id="photo-placeholder"><div style="font-size:22px;margin-bottom:4px;">📷</div><div style="font-size:13px;color:#888;">Tap to add a photo</div></div>
      <img id="photo-preview" class="photo-preview" style="display:none;"/>
    </div>
  </div>
  <div style="padding-bottom:1rem;"><button class="btn btn-primary" onclick="logCatch()">🎣 Log this catch</button></div>`;
}

function buildFeed(){
  let catches=groupCatches();
  if(state.feedSort==='weight')catches=[...catches].sort((a,b)=>(parseFloat(b.weight)||0)-(parseFloat(a.weight)||0));
  else catches=[...catches].sort((a,b)=>b.ts-a.ts);
  const sortBtns=`<div class="sort-row">
    <button class="sort-btn${state.feedSort==='recent'?' active':''}" onclick="setFeedSort('recent')">Most recent</button>
    <button class="sort-btn${state.feedSort==='weight'?' active':''}" onclick="setFeedSort('weight')">Heaviest</button>
  </div>`;
  if(!catches.length)return sortBtns+`<div class="empty-state"><div class="empty-icon">🐟</div>No catches yet.</div>`;
  return sortBtns+catches.map(c=>{
    const col=userColor(c.userId),init=initials(c.anglerName);
    const img=c.photo?`<img class="catch-img" src="${c.photo}" alt="catch"/>`:`<div class="catch-img-ph">🐟</div>`;
    const tags=[c.lure,c.reel,c.time,c.weather].filter(Boolean).map(t=>`<span class="catch-tag">${t}</span>`).join('');
    const d=new Date(c.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div class="catch-card">${img}
      <div class="catch-body">
        <div class="catch-header"><span class="catch-fish">${c.fishType||'Unknown'}</span>${c.weight?`<span class="catch-weight">${parseFloat(c.weight).toFixed(1)} lb</span>`:''}</div>
        ${c.location?`<div style="font-size:11px;color:#888;margin-bottom:3px;">📍 ${c.location}</div>`:''}
        <div class="catch-tags">${tags}</div>
        <div style="margin-top:7px;display:flex;align-items:center;gap:6px;">
          <div style="width:20px;height:20px;border-radius:50%;background:${col.bg};color:${col.text};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;">${init}</div>
          <span style="font-size:11px;color:#888;">${c.anglerName} · ${d}</span>
        </div>
      </div></div>`;
  }).join('');
}

function buildGroupPanel(){
  const g=db.groups[state.currentGroupId];if(!g)return'';
  const members=g.members.map(id=>db.users[id]).filter(Boolean);
  return `
  <div class="card">
    <div class="card-title">Group info</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:4px;">${g.name}</div>
    <div style="font-size:13px;color:#888;margin-bottom:.75rem;">${members.length} member${members.length!==1?'s':''}</div>
    <div style="font-size:12px;color:#888;margin-bottom:4px;">Share this code to invite friends:</div>
    <div class="group-code">${g.code}</div>
    <button class="btn btn-sm" onclick="copyCode('${g.code}')" style="width:100%;margin-top:4px;">Copy invite code</button>
  </div>
  <div class="card">
    <div class="card-title">Members</div>
    ${members.map(m=>{
      const col=userColor(m.id),isMe=m.id===state.currentUser.id,isAdmin=g.adminId===m.id;
      return `<div class="member-row">
        <div class="angler-avatar" style="width:34px;height:34px;font-size:12px;background:${col.bg};color:${col.text};">${initials(m.name)}</div>
        <div style="flex:1;"><div style="font-size:14px;font-weight:500;">${m.name}${isMe?' (you)':''}</div><div style="font-size:11px;color:#888;">@${m.username}</div></div>
        <span class="badge ${isAdmin?'badge-admin':'badge-member'}">${isAdmin?'Admin':'Member'}</span>
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;padding-bottom:1rem;">
    <button class="btn" onclick="switchGroupOuter()" style="flex:1;">Switch group</button>
    <button class="btn btn-danger btn-sm" onclick="leaveGroup()" style="flex:1;">Leave group</button>
  </div>`;
}

function switchGroupOuter(){state.currentGroupId=null;saveSession();render();}

function copyCode(code){
  try{navigator.clipboard.writeText(code);}catch(e){}
  showToast('Code copied: '+code);
}

function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    state.photoDataUrl=ev.target.result;
    const ph=document.getElementById('photo-placeholder');
    const prev=document.getElementById('photo-preview');
    if(ph)ph.style.display='none';
    if(prev){prev.src=state.photoDataUrl;prev.style.display='block';}
  };
  reader.readAsDataURL(file);
}

function handleCombo(selectId,inputId){
  const sel=document.getElementById(selectId),inp=document.getElementById(inputId);
  if(sel&&inp&&sel.value)inp.value=sel.value;
}

function logCatch(){
  const fishType=v('fish-type'),weight=v('fish-weight'),time=v('time-of-day'),weather=v('weather'),location=v('location').trim();
  const lure=v('lure-custom').trim()||v('lure-type');
  const reel=v('reel-custom').trim()||v('reel-type');
  if(!fishType){showToast('⚠️ Select a fish species');return;}
  db.catches.push({id:uid(),userId:state.currentUser.id,anglerName:state.currentUser.name,groupId:state.currentGroupId,fishType,weight,lure,reel,time,weather,location,photo:state.photoDataUrl,ts:Date.now()});
  saveDB();state.photoDataUrl=null;state.activeTab='leaderboard';showToast('🎣 Catch logged!');renderApp();
}

function switchTab(tab){state.activeTab=tab;renderTabContent();}
function setSort(m){state.sortMode=m;renderTabContent();}
function setFeedSort(m){state.feedSort=m;renderTabContent();}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

loadDB();
</script>
</body>
</html>
